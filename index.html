<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA básico -->
    <title>SerenIA</title>
    <meta name="description" content="Tu espacio seguro para expresarte y sentirte mejor" />
    <meta name="theme-color" content="#3d7a5e" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SerenIA" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph (para compartir) -->
    <meta property="og:title" content="SerenIA" />
    <meta property="og:description" content="Tu asistente emocional con IA" />
    <meta property="og:type" content="website" />

    <!-- Eruda (debug móvil) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      window.addEventListener('load', function() {
        eruda.init();
      });
    </script>

    <!-- Registrar Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('SW registrado:', reg.scope))
            .catch((err) => console.log('SW error:', err))
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
